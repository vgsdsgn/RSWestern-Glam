<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Western Glam</title>

<style>

body{
margin:0;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:sans-serif;
}

.poster{
position:relative;
width:100%;
max-width:500px;
}

.poster img{
width:100%;
display:block;
}

/* botones invisibles */
.btn{
position:absolute;
display:block;
}

/* SPOTIFY (sticker superior derecho) */
.spotify{
top:12%;
left:62%;
width:30%;
height:12%;
}

/* MAPS (dirección) */
.maps{
top:43%;
left:48%;
width:42%;
height:9%;
}

/* RSVP */
.rsvp{
top:54%;
left:56%;
width:30%;
height:9%;
}

</style>
</head>

<body>

<div class="poster">

<img src="invitacion.jpg">

<a class="btn spotify" 
href="PON_AQUI_TU_LINK_DE_SPOTIFY" 
target="_blank"></a>

<a class="btn maps" 
href="PON_AQUI_TU_LINK_DE_MAPS" 
target="_blank"></a>

<a class="btn rsvp" 
href="PON_AQUI_TU_LINK_DE_WHATSAPP" 
target="_blank"></a>

</div>

</body>
</html>
